<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Query Bridge Options</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f2eb;
      --panel: #fffdf7;
      --ink: #1f1f1a;
      --muted: #6b665d;
      --line: #d7d2c7;
      --accent: #1f5eff;
      --accent-soft: #dfe8ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(31, 94, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #f7f4ed 0%, var(--bg) 100%);
      color: var(--ink);
      font: 15px/1.5 "Segoe UI", system-ui, sans-serif;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .lead {
      margin: 0 0 28px;
      color: var(--muted);
      max-width: 70ch;
    }

    form {
      display: grid;
      gap: 20px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 14px 36px rgba(43, 36, 19, 0.08);
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
    }

    input:focus {
      outline: 2px solid var(--accent-soft);
      border-color: var(--accent);
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    button[type="submit"] {
      background: var(--accent);
      color: white;
    }

    button[type="button"] {
      background: #ebe6db;
      color: var(--ink);
    }

    #status {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Local Query Bridge</h1>
    <p class="lead">Set the project-specific base URL and the prompt cap per chat. When the cap is reached, the next screenshot submission opens a fresh chat on the configured start page.</p>

    <form id="options-form">
      <label for="default-start-page-url">
        Default start page
        <input id="default-start-page-url" name="defaultStartPageUrl" type="url" required>
        <p class="hint">Use the ChatGPT project base URL. Any tab whose URL starts with that base will be treated as a valid target.</p>
      </label>

      <label for="reset-limit">
        Reset limit
        <input id="reset-limit" name="resetLimit" type="number" min="0" step="1" inputmode="numeric">
        <p class="hint">`0` disables auto-reset. Any positive number means the next prompt after that many extension submissions opens a fresh chat.</p>
      </label>

      <div class="actions">
        <button type="submit">Save settings</button>
        <button id="reset-defaults" type="button">Restore defaults</button>
      </div>

      <p id="status" aria-live="polite"></p>
    </form>
  </main>

  <script src="options.js"></script>
</body>
</html>
